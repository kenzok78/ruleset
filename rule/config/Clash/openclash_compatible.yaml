# OpenClash 兼容版（Meta/Premium 均可用）
# 特点：不使用 mrs 规则格式，全部采用 text/yaml rule-provider

proxy-providers:
  机场1:
    type: http
    interval: 1800
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🌐 直连
    url: "订阅1"
  机场2:
    type: http
    interval: 1800
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🌐 直连
    url: "订阅2"
  机场3:
    type: http
    interval: 1800
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🌐 直连
    url: "订阅3"

provider-anchor:
  all: &all [机场1, 机场2, 机场3]

unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"

proxies:
  - name: "🌐 直连"
    type: direct
    udp: true

aipr: &pr {type: select, proxies: [🚀 节点选择, ♻️ 香港自动, ♻️ 日本自动, ♻️ 美国自动, ♻️ 新加坡自动, ♻️ 集合自动, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇸🇬 新加坡节点, 🇺🇳 集合节点, 🌍 全部节点, 🌐 直连]}

proxy-groups:
  - {name: 🚀 节点选择, type: select, proxies: [♻️ 香港自动, ♻️ 日本自动, ♻️ 美国自动, ♻️ 新加坡自动, ♻️ 集合自动, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇸🇬 新加坡节点, 🇺🇳 集合节点, 🌍 全部节点, 🌐 直连]}
  - {name: ▶️ YouTube, <<: *pr}
  - {name: 📔 Google, <<: *pr}
  - {name: 🔮 OpenAI, <<: *pr}
  - {name: 🧠 Claude, <<: *pr}
  - {name: 🤖 Gemini, <<: *pr}
  - {name: 🐦 Twitter, <<: *pr}
  - {name: 📦 GitHub, <<: *pr}
  - {name: Ⓜ️ Microsoft, <<: *pr}
  - {name: 🎵 TikTok, <<: *pr}
  - {name: 📺 NETFLIX, <<: *pr}
  - {name: 💳 PayPal, <<: *pr}
  - {name: 🍎 Apple, type: select, proxies: [🌐 直连, 🚀 节点选择]}
  - {name: 🎯 全球直连, type: select, proxies: [🌐 直连, 🚀 节点选择]}
  - {name: 🌀 列表之外, <<: *pr}
  - {name: 🇭🇰 香港节点, type: select, use: *all, filter: "(?i)港|hk|hongkong|hong kong"}
  - {name: 🇯🇵 日本节点, type: select, use: *all, filter: "(?i)日|jp|japan"}
  - {name: 🇺🇲 美国节点, type: select, use: *all, filter: "(?i)美|us|unitedstates|united states"}
  - {name: 🇸🇬 新加坡节点, type: select, use: *all, filter: "(?i)新|sg|singapore"}
  - {name: 🇺🇳 集合节点, type: select, use: *all, filter: "(?i)台|tw|taiwan|韩|kr|korea"}
  - {name: ♻️ 香港自动, type: url-test, use: *all, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: ♻️ 日本自动, type: url-test, use: *all, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  - {name: ♻️ 美国自动, type: url-test, use: *all, tolerance: 20, interval: 300, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"}
  - {name: ♻️ 新加坡自动, type: url-test, use: *all, tolerance: 20, interval: 300, filter: "(?=.*(新|SG|(?i)Singapore))^((?!(港|台|日|韩|美)).)*$"}
  - {name: ♻️ 集合自动, type: url-test, use: *all, tolerance: 20, interval: 300, filter: "(?i)台|tw|taiwan|韩|kr|korea"}
  - {name: ♻️ 自动选择, type: url-test, use: *all, tolerance: 20, interval: 300}
  - {name: 🌍 全部节点, type: select, use: *all}

rules:
  - RULE-SET,private_domain,🌐 直连
  - RULE-SET,direct1,🌐 直连
  - RULE-SET,apple_domain,🍎 Apple
  - RULE-SET,proxylite,🚀 节点选择
  - RULE-SET,openai_domain,🔮 OpenAI
  - RULE-SET,claude_domain,🧠 Claude
  - RULE-SET,gemini_domain,🤖 Gemini
  - RULE-SET,twitter_domain,🐦 Twitter
  - RULE-SET,github_domain,📦 GitHub
  - RULE-SET,microsoft_domain,Ⓜ️ Microsoft
  - RULE-SET,youtube_domain,▶️ YouTube
  - RULE-SET,google_domain,📔 Google
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,netflix_domain,📺 NETFLIX
  - RULE-SET,paypal_domain,💳 PayPal
  - RULE-SET,cn_domain,🎯 全球直连
  - RULE-SET,cn_ip,🎯 全球直连,no-resolve
  - RULE-SET,geolocation-!cn,🚀 节点选择
  - MATCH,🌀 列表之外

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: text}
  domain: &domain {type: http, interval: 86400, behavior: classical, format: yaml}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

rule-providers:
  private_domain: { <<: *class, url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt" }
  direct1: { <<: *class, url: "https://raw.githubusercontent.com/kenzok78/ruleset/main/rule/Direct.list" }
  proxylite: { <<: *class, url: "https://raw.githubusercontent.com/kenzok78/ruleset/main/rule/ProxyLite.list" }
  openai_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml" }
  claude_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Anthropic/Anthropic.yaml" }
  gemini_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml" }
  twitter_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.yaml" }
  youtube_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml" }
  google_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.yaml" }
  github_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml" }
  netflix_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.yaml" }
  paypal_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/PayPal/PayPal.yaml" }
  microsoft_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml" }
  apple_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml" }
  tiktok_domain: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.yaml" }
  geolocation-!cn: { <<: *domain, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global.yaml" }
